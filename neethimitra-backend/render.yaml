# render.yaml — Render.com infrastructure-as-code for NeethiMitra AI backend
# Deploy: Push this file to your GitHub repo, then connect it on Render Dashboard.
# Docs: https://render.com/docs/yaml-spec

services:
  - type: web
    name: neethimitra-backend
    env: python
    region: singapore          # Closest to India
    plan: free                 # Free tier — upgrade when needed

    buildCommand: |
      pip install -r requirements.txt &&
      alembic upgrade head

    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /health

    envVars:
      # -- Server -------------------------------------------------------------
      - key: ENVIRONMENT
        value: production

      # -- Database (auto-linked from Render Postgres below) ------------------
      - key: DATABASE_URL
        fromDatabase:
          name: neethimitra-db
          property: connectionString

      # -- JWT (auto-generated strong secret) --------------------------------
      - key: SECRET_KEY
        generateValue: true

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "30"
      - key: GUEST_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: GUEST_QUERY_LIMIT
        value: "3"

      # -- OTP Rate Limiting --------------------------------------------------
      - key: OTP_MAX_REQUESTS_PER_WINDOW
        value: "3"
      - key: OTP_WINDOW_MINUTES
        value: "10"
      - key: OTP_MAX_ATTEMPTS
        value: "5"

      # -- CORS (add your Render URL + custom domain after deploy) -----------
      - key: ALLOWED_ORIGINS
        value: "https://neethimitra-backend.onrender.com"

      # -- Secrets: set manually in Render Dashboard ? Environment -----------
      # NOTE-MANUAL: Do NOT put actual values here — set in Render Dashboard
      - key: GOOGLE_CLIENT_ID
        sync: false            # Set manually: https://console.cloud.google.com

      - key: FAST2SMS_API_KEY
        sync: false            # Set manually: https://fast2sms.com

      - key: SARVAM_API_KEY
        sync: false            # Set manually: https://dashboard.sarvam.ai

databases:
  - name: neethimitra-db
    databaseName: neethimitra
    user: neethimitra
    region: singapore
    plan: free                 # Render free Postgres (sufficient for hackathon)
