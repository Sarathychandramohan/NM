services:
  - type: web
    name: neethimitra-backend
    runtime: python
    rootDir: neethimitra-backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SARVAM_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: MSG91_AUTH_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: neethimitra-db
          property: connectionString
      - key: AUDIO_CACHE_DIR
        value: /data/audio
      - key: PDF_DIR
        value: /data/complaints
      - key: UPLOAD_DIR
        value: /data/uploads

databases:
  - name: neethimitra-db
    plan: free

disks:
  - name: neethimitra-storage
    mountPath: /data
    sizeGB: 1
